name: RunReport
env:
  EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
  
on:
  schedule:
    - cron: '11 5,8,11,14,17,20 * * *'
  workflow_dispatch: 
  #push:
  #  branches: [master]
    
jobs:
  run-report:

    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Log UTC time
      run: date -u
      
    - name: Checkout repo
      uses: actions/checkout@v6.0.2
          
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run GenerateReport
      run: python main.py

    - name: Commit files
      run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html -f
          git add docs/birds_all.html -f
          git add docs/obs_cache.csv -f
          git add docs/daily_obs_counts.csv -f
          git add docs/monthly_obs_counts.csv -f
          git diff --cached --quiet || git commit -m "Updated files by GitHub scheduled Action"
          git push
        
