name: RunReport
  
on:
  schedule:
    - cron: '19 * * * *'
  workflow_dispatch: 
    
jobs:
  run-report:

    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
    - name: Log UTC time
      run: date -u
      
    - name: Checkout repo
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run GenerateReport
      run: python main.py

    - name: Commit index.html
      run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Updated index.html by GitHub scheduled Action"
          git push
        
